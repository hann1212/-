<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>永劫无间</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    section[class^="box"] {
      width: 100%;
      height: 100%;
    }

    .box1 {
      background: url(./img/顾倾寒.jpg) no-repeat fixed center center/cover;

    }

    .content {
      width: 100%;
      height: 10%;
      background-color: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      color: #111;
      line-height: 25px;
      font-size: 20px;
      padding: 20px;
      margin: 0 auto;
    }

    .box2 {
      background: url(./img/宁红叶.png) no-repeat fixed center center/cover;
    }

    .box3 {
      background: url(./img/纪莹莹.png) no-repeat fixed center center/cover;
    }

    .box4 {
      background: url(./img/殷紫萍.png) no-repeat fixed center center/cover;
    }

    .box5 {
      background: url(./img/呆呆姬.png) no-repeat fixed center center/cover;
    }

    .box6 {
      background: url(./img/崔三娘.png) no-repeat fixed center center/cover;
    }
  </style>
</head>

<body>
  <section class="box1">
    <div class="content">
      <p>顾倾寒</p>
      <p>无极帝国长公主，幼时遭遇宫廷政变，家破人亡，随母亲流亡月轮国，习得寒冰功法，后来回国复仇寻亲。</p>

    </div>
  </section>
  <section class="box2">
    <div class="content">
      <p>宁红叶</p>
      <p>昆仑弟子，身负封印重任，为守护苍生而踏上征途。</p>
    </div>
  </section>
  <section class="box3">
    <div class="content">
      <p>纪莹莹</p>
      <p>无常司女捕快，身负家族秘密，奉命追查江湖悬案。</p>
    </div>
  </section>
  <section class="box4">
    <div class="content">
      <p>殷紫萍</p>
      <p>出身平凡的医者，心怀仁善，以医术行走世间救死扶伤</p>
    </div>
  </section>
  <section class="box5">
    <div class="content">
      <p>呆呆姬</p>
      <p>与妖刀共生的少女，在力量与本心之间艰难挣扎。</p>
    </div>
  </section>
  <section class="box6">
    <div class="content">
      <p>崔三娘</p>
      <p>执掌海域的女中豪杰，性情刚烈，为情义与信念闯荡江湖</p>
    </div>
  </section>



</body>

</html>
